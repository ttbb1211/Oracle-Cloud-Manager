version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracle-app
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped
